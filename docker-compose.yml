x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment:
    DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/pybot_itacadem.db}
    AUTO_SEED_DB: ${AUTO_SEED_DB:-true}
    FSM_STORAGE_BACKEND: ${FSM_STORAGE_BACKEND:-redis}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  depends_on:
    redis:
      condition: service_healthy
  volumes:
    - pybot_data:/app/data

services:
  bot:
    <<: *app-service
    container_name: pybot-bot
    command: ["/app/scripts/docker-entrypoint.sh"]

  taskiq-worker:
    <<: *app-service
    container_name: pybot-taskiq-worker
    command:
      [
        "uv",
        "run",
        "taskiq",
        "worker",
        "src.pybot.infrastructure.taskiq.entrypoint:broker",
        "--workers",
        "1",
      ]

  taskiq-scheduler:
    <<: *app-service
    container_name: pybot-taskiq-scheduler
    command:
      [
        "uv",
        "run",
        "taskiq",
        "scheduler",
        "src.pybot.infrastructure.taskiq.entrypoint:scheduler",
        "--skip-first-run",
      ]

  redis:
    image: redis:7-alpine
    container_name: pybot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pybot_data:
  redis_data:
