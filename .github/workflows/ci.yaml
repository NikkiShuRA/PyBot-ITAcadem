name: CI - Code Quality

on:
  push:
    branches: [ main, dev-Ilya ]
  pull_request:
    branches: [ main, dev-Ilya ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-build-and-compose-validation:
    name: Docker Build & Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare CI .env for compose validation
        run: |
          cat > .env <<'EOF'
          BOT_TOKEN=123456:CI_TEST_BOT_TOKEN
          BOT_TOKEN_TEST=123456:CI_TEST_BOT_TOKEN
          BOT_MODE=test
          ROLE_REQUEST_ADMIN_TG_ID=1
          AUTO_ADMIN_TELEGRAM_IDS=[1]
          DATABASE_URL=sqlite+aiosqlite:///./data/pybot_itacadem.db
          AUTO_SEED_DB=false
          FSM_STORAGE_BACKEND=redis
          REDIS_URL=redis://redis:6379/0
          LOG_LEVEL=INFO
          DEBUG=false
          HEALTH_API_ENABLED=false
          APP_IMAGE=ghcr.io/example/pybot:test
          EOF

      - name: Build Docker image
        run: docker build -f Dockerfile .

      - name: Validate development compose config
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config > /dev/null

  cli-smoke-checks:
    name: CLI Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (including dev-group)
        run: uv sync --dev

      - name: Smoke-check pybot-seed CLI help
        run: uv run pybot-seed --help

  quality-checks:
    name: Lint, Format Check, Type Check, Architecture Check & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies (including dev-group)
        run: just install-dev

      - name: Run quality-gate (format check + lint + type check + arch check + tests)
        run: just quality-gate

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
