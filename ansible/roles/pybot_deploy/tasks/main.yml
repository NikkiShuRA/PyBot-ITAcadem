---
- name: Validate required deploy variables
  ansible.builtin.assert:
    that:
      - deploy_path is defined
      - deploy_compose_src is defined
      - app_env_src is defined
      - image_repository is defined
      - image_tag is defined
    fail_msg: "deploy_path, deploy_compose_src, app_env_src, image_repository, and image_tag are required."

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ deploy_path }}"
    - "{{ deploy_path }}/backups"

- name: Copy production compose file
  ansible.builtin.copy:
    src: "{{ deploy_compose_src }}"
    dest: "{{ deploy_path }}/docker-compose.prod.yml"
    mode: "0644"

- name: Copy production environment file
  ansible.builtin.copy:
    src: "{{ app_env_src }}"
    dest: "{{ deploy_path }}/.env"
    mode: "0600"

- name: Persist current APP_IMAGE in deploy environment file
  ansible.builtin.lineinfile:
    path: "{{ deploy_path }}/.env"
    regexp: "^APP_IMAGE="
    line: "APP_IMAGE={{ image_repository }}:{{ image_tag }}"
    create: true
    mode: "0600"

- name: Validate production SQLite path is volume-backed
  ansible.builtin.shell: |
    set -eu
    db_url="$(grep '^DATABASE_URL=' .env | cut -d= -f2- || true)"
    if [ -z "$db_url" ]; then
      exit 0
    fi
    case "$db_url" in
      sqlite+aiosqlite:///./data/*)
        exit 0
        ;;
      sqlite+aiosqlite:///*)
        echo "Production SQLite DATABASE_URL must point to ./data/... so migrations and runtime share the mounted volume." >&2
        exit 1
        ;;
      *)
        exit 0
        ;;
    esac
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  changed_when: false

- name: Log in to GHCR when deploy credentials are provided
  ansible.builtin.shell: |
    set -eu
    echo "{{ registry_token }}" | docker login ghcr.io --username "{{ registry_username }}" --password-stdin
  args:
    executable: /bin/sh
  no_log: true
  when:
    - registry_username is defined
    - registry_username | length > 0
    - registry_token is defined
    - registry_token | length > 0

- name: Back up SQLite database volume when present
  ansible.builtin.shell: |
    set -eu
    if docker volume inspect pybot_data_prod >/dev/null 2>&1; then
      docker run --rm \
        -v pybot_data_prod:/data \
        -v "{{ deploy_path }}/backups:/backup" \
        alpine:3.20 \
        sh -c 'if [ -f /data/pybot_itacadem.db ]; then cp /data/pybot_itacadem.db /backup/pybot_itacadem-$(date +%Y%m%d%H%M%S).db; fi'
    fi
  args:
    executable: /bin/sh
  changed_when: false

- name: Pull production images
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml pull
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Run one-shot database migrations
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile migration run --rm migrate
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Run one-shot seed step when explicitly requested
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml --profile seed run --rm seed
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
  when: run_seed_on_deploy | default(false) | bool

- name: Apply production compose
  ansible.builtin.shell: |
    set -eu
    docker compose -f docker-compose.prod.yml up -d --remove-orphans
  args:
    chdir: "{{ deploy_path }}"
    executable: /bin/sh
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"

- name: Show compose status after deploy
  ansible.builtin.command:
    cmd: docker compose -f docker-compose.prod.yml ps
    chdir: "{{ deploy_path }}"
  environment:
    APP_IMAGE: "{{ image_repository }}:{{ image_tag }}"
  changed_when: false
