source_roots = ["src"]

# ── pybot.core — базовый модуль: логгер, константы, настройки, конфиг ──────────
# Не зависит ни от чего. Используется всеми слоями.
[[modules]]
path = "pybot.core"
depends_on = []

# ── pybot.domain — доменные правила и исключения (Pragmatic DDD) ────────────────
# Проект использует Rich ORM Models: модели содержат доменную логику,
# поэтому domain-сервисы (например, level_calculator) работают с ORM-моделями
# напрямую. Это осознанное решение в рамках Pragmatic DDD, а не техдолг.
[[modules]]
path = "pybot.domain"
depends_on = ["pybot.core", "pybot.db"]

# ── pybot.dto — объекты передачи данных между слоями ────────────────────────────
# DTO используют utils для валидации и нормализации входных данных.
[[modules]]
path = "pybot.dto"
depends_on = ["pybot.domain", "pybot.core", "pybot.utils"]

# ── pybot.db — ORM-модели и конфигурация БД ─────────────────────────────────────
[[modules]]
path = "pybot.db"
depends_on = ["pybot.domain", "pybot.core", "pybot.utils", "pybot.dto"]

# ── pybot.mappers — маппинг между слоями ────────────────────────────────────────
[[modules]]
path = "pybot.mappers"
depends_on = ["pybot.domain", "pybot.dto", "pybot.db", "pybot.core"]

# ── pybot.infrastructure — репозитории и адаптеры ───────────────────────────────
# Порт нотификаций (telegram_notification_service) осознанно использует
# bot.keyboards и bot.texts для формирования сообщений — это порт на стыке
# инфраструктуры и презентации.
[[modules]]
path = "pybot.infrastructure"
depends_on = [
    "pybot.domain",
    "pybot.dto",
    "pybot.db",
    "pybot.utils",
    "pybot.mappers",
    "pybot.core",
    "pybot.services",   # ports (NotificationPort и пр.) объявлены в services
    "pybot.bot",        # telegram_notification_service использует bot.texts и keyboards
    "pybot.di",         # taskiq_app.py вызывает setup_taskiq_container
]

# ── pybot.services — бизнес-логика и оркестрация ────────────────────────────────
# Pragmatic DDD + Rich ORM Models: сервисы оркестрируют поведение через методы
# самих моделей, поэтому прямая зависимость на pybot.db — это осознанный выбор,
# а не нарушение. Дублировать ту же логику внутри репозиториев нет смысла.
# services→bot.texts: publisher и role_request используют тексты для рассылок.
[[modules]]
path = "pybot.services"
depends_on = [
    "pybot.domain",
    "pybot.dto",
    "pybot.infrastructure",
    "pybot.utils",
    "pybot.mappers",
    "pybot.core",
    "pybot.db",  # Rich ORM Models: сервисы вызывают методы моделей напрямую
    "pybot.bot", # bot.texts для форматирования рассылок и лидербордов
]

# ── pybot.di — контейнеры зависимостей (Dishka) ─────────────────────────────────
[[modules]]
path = "pybot.di"
depends_on = [
    "pybot.domain",
    "pybot.dto",
    "pybot.infrastructure",
    "pybot.services",
    "pybot.bot",
    "pybot.utils",
    "pybot.db",
    "pybot.core",
]

# ── pybot.bot — презентационный слой (Telegram / aiogram) ───────────────────────
# Содержит: хэндлеры, диалоги, клавиатуры, фильтры, мидлвари, тексты (bot.texts).
# bot.texts — часть этого слоя, не выделяется отдельно.
[[modules]]
path = "pybot.bot"
depends_on = [
    "pybot.domain",
    "pybot.dto",
    "pybot.services",
    "pybot.utils",
    "pybot.core",
    "pybot.di",             # tg_bot_run.py вызывает setup_container из di
    "pybot.mappers",        # dialog handlers используют user_mappers
]

# ── pybot.utils — общие утилиты ──────────────────────────────────────────────────
[[modules]]
path = "pybot.utils"
depends_on = ["pybot.core"]

# ── pybot.health — health-check API ─────────────────────────────────────────────
[[modules]]
path = "pybot.health"
depends_on = ["pybot.services", "pybot.core", "pybot.di", "pybot.dto"]

# ── pybot.cli — CLI entrypoints (seed, admin tools) ──────────────────────────────
# The seed script needs access to all application layers to bootstrap data through
# the real service/repository stack. This mirrors the dependency profile of pybot.di.
[[modules]]
path = "pybot.cli"
depends_on = [
    "pybot.core",
    "pybot.dto",
    "pybot.db",
    "pybot.domain",
    "pybot.infrastructure",
    "pybot.services",
    "pybot.di",
    "pybot.utils",
    "pybot.mappers",
]
